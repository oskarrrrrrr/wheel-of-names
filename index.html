<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Names</title>

    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            overscroll-behavior-y: none;
        }

        #canvas-div {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="canvas-div">
        <canvas id="canvas-wheel"></canvas>
    </div>
</body>

<script>

const colors = ["#232F18", "#7AE958", "#CBCBE7", "#C8C9BB", "#912B21", "#7E330C", "#E9A75D", "#A7E2BF"]

// const names = ["jim", "john", "jose", "jade", "jack", "james", "juan", "javier", "jorge"];
const names = ["jim", "john", "jose", "jade"]

let lastTime = performance.now()
let startAngle = (2*Math.PI / names.length) * 0.2;

function draw() {
    const now = performance.now()
    const timeDiff = now - lastTime;
    lastTime = now;

    startAngle = startAngle + (timeDiff * (2*Math.PI) / 10000)

    const canvas = document.getElementById("canvas-wheel")

    const ratio = window.devicePixelRatio || 1
    canvas.width = document.body.clientWidth * ratio
    canvas.height = document.body.clientHeight * ratio

    canvas.style.width = document.body.clientWidth + "px"
    canvas.style.height = document.body.clientHeight + "px"

    const ctx = canvas.getContext("2d")
    ctx.scale(ratio, ratio)

    ctx.fillStyle = "grey";
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    const angleStep = 2*Math.PI/names.length;
    for (let i = 0; i < names.length; i++) {
        ctx.resetTransform()
    	
        ctx.beginPath();
        ctx.fillStyle = colors[i%colors.length]
        ctx.moveTo(canvas.width/2, canvas.height/2)
        const radius = Math.min(canvas.width, canvas.height) * 0.8 / 2
        ctx.arc(canvas.width/2, canvas.height/2, radius, startAngle + angleStep * i, startAngle + angleStep * (i+1), false);
        ctx.closePath()
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.strokeStyle = "grey";
        ctx.translate(canvas.width/2, canvas.height/2)
        ctx.rotate(startAngle + angleStep * (i + 1/2 + 1/10))
        ctx.translate(radius, 0)
        ctx.font = "150px arial";
        ctx.textAlign = "end"
        ctx.fillText(names[i] + " ", 0, 0, radius);
        ctx.strokeText(names[i] + " ", 0, 0, radius);
        ctx.fill();
    }

    window.requestAnimationFrame(draw);
}

window.requestAnimationFrame(draw);

</script>

</html>
