<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Names</title>

    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            overscroll-behavior-y: none;
            font-family: Arial;
        }

        h1, h2 {
            color: white;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #canvas-div {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
        }

        #names-textarea {
            color: white;
        }

        #names-list {
            position: absolute;
            z-index: 100;
            top: 1%;
            right: 1%;
            display: flex;
            flex-direction: column;
            gap: .5em;
        }

        #result-dialog {
            width: 400px;
            border: 3px solid white;
        }

        #result-dialog-div {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1em;
            align-items: center;
        }

        #result-buttons {
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 1em;
            justify-content: flex-end;
        }

        #spin-button {
            display: none;
        }

        button {
            cursor: pointer;

            min-width: 100px;
            padding: 4px;
            color: white;
            background-color: #8d909a;
            border: 2px solid #676a79;
            border-radius: 7px;
        }

        button:disabled {
            cursor: default;
        }

        textarea {
          resize: none;
        }
    </style>
</head>

<body>
    <div id="canvas-div">
        <canvas id="canvas-wheel"></canvas>
    </div>
    <div id="names-list">
        <textarea id="names-textarea" rows="10"></textarea>
        <button id="spin-button" onclick="spin()">spin</button>
    </div>

    <dialog id="result-dialog">
        <div id="result-dialog-div">
            <h1 id="result-dialog-name"></h1>
            <div id="result-buttons">
                <button onclick="endSpin(true)">Remove</button> 
                <button onclick="endSpin(false)">Ok</button> 
            </div>
        </div>
    </dialog>
</body>

<script>

/* Utilities */

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function clamp(num, min, max) { return Math.max(Math.min(num, max), min); }
function pow2(x) { return x * x; }
function distanceSquared(p1, p2) { return pow2(p1[0]-p2[0]) + pow2(p1[1]-p2[1]); }
function distance(p1, p2) { return Math.sqrt(distanceSquared(p1, p2)); }

/***/

/* Static HTML Elements */

const canvas = document.getElementById("canvas-wheel")
const namesTextArea = document.getElementById("names-textarea")
const spinButton = document.getElementById("spin-button")
const resultDialog = document.getElementById("result-dialog")
const resultDialogName = document.getElementById("result-dialog-name")

/***/

const colors = ["#D9A69F", "#6C739C", "#D8C4BF", "#BABBB1", "#C56B62", "#424658", "#DEA785"]
shuffleArray(colors)

namesTextArea.style.backgroundColor = "#424658";

let names = ["Brooklyn", "Manhattan", "Bronx", "Queens", "Staten Island"]
namesTextArea.value = names.join("\n")

// The number of physical pixels used to display a single CSS pixel.
let displayRatio;

function refreshDisplay() {
    displayRatio = window.devicePixelRatio || 1;

    canvas.width = document.body.clientWidth * displayRatio
    canvas.height = document.body.clientHeight * displayRatio
    canvas.style.width = document.body.clientWidth + "px"
    canvas.style.height = document.body.clientHeight + "px"
}
refreshDisplay();

let startAngle = 0;
let angleLeft = 0;
let lastWinner = '';
let indexToRemove = -1

let lastTime = performance.now()

let lastMousePositionTime = performance.now();
let lastMousePosition = [0, 0];

// Track mouse angular velocity when grabbed to automatically spin the wheel when the mouse is released and appropriate velocity was reached.
let RECENT_MOUSE_ANGULAR_VELOCITIES_COUNT = 5;
let recentMouseAngularVelocities = new Array(RECENT_MOUSE_ANGULAR_VELOCITIES_COUNT).fill(0);
let recentMouseAngularVelocitiesIndex = 0;
function recordMouseAngularVelocity(v) {
    recentMouseAngularVelocities[recentMouseAngularVelocitiesIndex] = v;
    recentMouseAngularVelocitiesIndex = (recentMouseAngularVelocitiesIndex + 1) % RECENT_MOUSE_ANGULAR_VELOCITIES_COUNT;
}
function shouldStartSpinning() {
    const reachedVelocity = recentMouseAngularVelocities.some((v) => v > 0.02);
    const goodDirection = recentMouseAngularVelocities.filter((v) => v > 0).length >= 0.8 * RECENT_MOUSE_ANGULAR_VELOCITIES_COUNT;
    return reachedVelocity && goodDirection;
}

// Wheel grabbed using mouse.
let grabbed = false;
let grabPrevPos = [0, 0];

// Wheel is spinning, i.e. we triggered a random pick.
let spinning = false;

canvas.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    if (spinning) return;

    const mousePosition = [e.clientX, e.clientY];
    const center = [canvas.width / displayRatio / 2, canvas.height / displayRatio / 2];
    const radius = (Math.min(canvas.width, canvas.height) * 0.8 / 2) / displayRatio;
    if (distanceSquared(center, mousePosition) < pow2(radius)) {
        grabbed = true;
        grabPrevPos = [e.clientX, e.clientY];
    }
});

canvas.addEventListener("mouseup", (e) => {
    if (e.button !== 0) return;
    if (spinning) return;
    if (grabbed) {
        grabbed = false;
        if (shouldStartSpinning()) {
            spin();
        }
        return;
    }
});

document.documentElement.addEventListener('mouseleave', () => {
    if (grabbed && shouldStartSpinning()) {
        grabbed = false;
        spin();
    }
    grabbed = false;
});

function getAngleDifference(e) {
    let prevAngle = Math.atan2(grabPrevPos[1] - canvas.height/displayRatio/2, grabPrevPos[0] - canvas.width/displayRatio/2);
    if (prevAngle < 0) prevAngle = 2*Math.PI + prevAngle;

    let currAngle = Math.atan2(e.clientY - canvas.height/displayRatio/2, e.clientX - canvas.width/displayRatio/2);
    if (currAngle < 0) currAngle = 2*Math.PI + currAngle;

    angleDiff = currAngle - prevAngle;
    return angleDiff;
}

canvas.addEventListener("mousemove", (e) => {
    const mousePosition = [e.clientX, e.clientY];

    const now = performance.now()

    const angleDifference = getAngleDifference(e);
    const angularVelocity = angleDifference / (now - lastMousePositionTime);
    recordMouseAngularVelocity(angularVelocity);

    lastMousePositionTime = now;
    lastMousePosition = mousePosition;

    const center = [canvas.width / displayRatio / 2, canvas.height / displayRatio / 2];
    const radius = (Math.min(canvas.width, canvas.height) * 0.8 / 2) / displayRatio;

    const mouseInWheel = distanceSquared(center, mousePosition) < pow2(radius);
    if ((mouseInWheel || grabbed) && !spinning) {
        document.body.style.cursor = 'pointer';
    } else {
        document.body.style.cursor = 'default';
    }

    if (grabbed) {
        startAngle += getAngleDifference(e);
        grabPrevPos = [e.clientX, e.clientY];
    }
});

function spin() {
    if (spinning) {
        console.warn('Attempted to spin while already spinning');
        return;
    }
    if (names.length === 1 && names[0] === '') return

    spinning = true;

    namesTextArea.disabled = true;
    spinButton.disabled = true;

    angleLeft = 2*Math.PI * 3 + Math.random() * 2*Math.PI*5;
    const nameIndex = names.length - 1 - Math.floor(((startAngle + angleLeft) % (2*Math.PI)) / (2*Math.PI/names.length));
    indexToRemove = nameIndex;
    lastWinner = names[nameIndex];
}

function endSpin(remove) {
    namesTextArea.disabled = false;
    spinButton.disabled = false;

    if (remove) {
        names.splice(indexToRemove, 1) 
        namesTextArea.value = names.join("\n")
    }

    indexToRemove = -1
    resultDialog.close()
    spinning = false;
}

function draw() {
    refreshDisplay();

    function getColor(i) {
        return colors[(i%colors.length + Math.trunc(i/colors.length)) % colors.length];
    }

    const now = performance.now()
    const timeDiff = now - lastTime;
    lastTime = now;

    names = namesTextArea.value.split("\n").filter((s) => s !== '')
    if (names.length === 0) names = ['']

    const angleDiff = Math.min(Math.sqrt(angleLeft) * (timeDiff * (2*Math.PI) / 3000), angleLeft)
    startAngle = (startAngle + angleDiff) % (2*Math.PI)
    angleLeft -= angleDiff

    if (angleLeft === 0) {
        resultDialogName.innerText = lastWinner

        if (!resultDialog.open && indexToRemove >= 0) {
            const color = getColor(indexToRemove);
            resultDialog.style.backgroundColor = color;
            resultDialog.showModal();
            // first button gets highlighted automatically
            document.activeElement.blur()
        }
    }

    const ctx = canvas.getContext("2d")
    ctx.scale(displayRatio, displayRatio)

    ctx.fillStyle = "grey";
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    const radius = Math.min(canvas.width, canvas.height) * 0.8 / 2

    const angleStep = 2*Math.PI/names.length;
    for (let i = 0; i < names.length; i++) {
        ctx.resetTransform()
    	
        // colorful pizza slices
        ctx.beginPath();
        ctx.fillStyle = getColor(i);
        ctx.moveTo(canvas.width/2, canvas.height/2)
        ctx.arc(canvas.width/2, canvas.height/2, radius, startAngle + angleStep * i, startAngle + angleStep * (i+1), false);
        ctx.closePath()
        ctx.fill();

        // white outline
        if (names.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = "white"
            ctx.moveTo(canvas.width/2, canvas.height/2)
            ctx.arc(canvas.width/2, canvas.height/2, radius, startAngle + angleStep * i, startAngle + angleStep * (i+1), false);
            ctx.closePath()
            ctx.lineWidth = 3
            ctx.stroke();
            ctx.lineWidth = 1
        }

        // white circle in the middle
        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.arc(canvas.width/2, canvas.height/2, radius / 10, 0, 2*Math.PI, false);
        ctx.fill()

        // names
        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.strokeStyle = "grey";
        ctx.translate(canvas.width/2, canvas.height/2)
        ctx.rotate(startAngle + angleStep * (i + 1/2))
        ctx.translate(radius, 0)

        // draw name
        {
            /*
                We use heuristics to make sure that the names are displayed nicely. The goal is to
                display a large font but not so large that we squish the text. We focus on names
                so the text is assumed to be relatively short - in most cases up to ~10 characters.
                Text that is a bit longer will be handled gracefully but as the names get longer
                things will start breaking.

                I'm sure the logic could be simplified a bit but it seems to be working pretty well
                so maybe it's not worth messing with it.
            */

            // limit max font size by pretending that slices are at most that big
            const maxSliceAngle = Math.PI / 4
            const angleStepForFont = Math.min(angleStep, maxSliceAngle);

            // Arc chord length forula: 2 * radius * sin(theta / 2)
            // Here we pick a font size which height fits perfectly at radius/2 distance from center.
            const optimisticFontSize = radius * Math.sin(angleStepForFont/2);

            const nameLen = names[i].trim().length;

            // As the text gets longer we want to make it smaller. It will get squished horizontally
            // but it is not enough when the text gets long enough.
            const longNameMultiplier = clamp(1 - ((nameLen - 10) / 50), 0.5, 1);

            const magicMultiplier = 0.3
            const fontSize = longNameMultiplier * optimisticFontSize * displayRatio * magicMultiplier;

            ctx.font = fontSize + "px arial";
            ctx.textAlign = "end"
            ctx.textBaseline = "middle"

            // Add padding on both sides using whitespace
            const displayName = "       " + names[i].trim() + " ";
            ctx.fillText(displayName, 0, 0, radius);
        }

        ctx.fill();
    }

    // result indicator triangle
    ctx.resetTransform()
    ctx.beginPath()
    ctx.strokeStyle = "red";
    ctx.moveTo(canvas.width/2 + radius * 0.95, canvas.height/2);
    ctx.lineTo(canvas.width/2 + (radius * 1.05), canvas.height/2 + radius*0.06);
    ctx.lineTo(canvas.width/2 + (radius * 1.05), canvas.height/2 - radius*0.06);
    ctx.fill()

    window.requestAnimationFrame(draw);
}

window.requestAnimationFrame(draw);

</script>

</html>
